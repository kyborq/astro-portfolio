server {
    listen 80;
    server_name mentor.k-podyganov.ru;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        try_files /mentor/index.html =404;
    }

    location /_astro/ {
        try_files $uri =404;
    }

    location ~ ^/(favicon\.svg|avatar\.jpg|projects/) {
        try_files $uri =404;
    }
}

server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }
}
